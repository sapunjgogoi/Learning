<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique ID Generator</title>
    <style>
        /* CSS: Styling the interface */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #1a1a1a;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #id-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #cbd5e0;
            word-break: break-all;
        }

        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Unique ID Generator</h1>
        <div id="id-display">Click generate to start</div>
        <button id="generate-btn">Generate Unique Number</button>
        <p class="hint">Uses Timestamp + Random Entropy</p>
    </div>

    <script>
        // JS: Logical generation
        const generateBtn = document.getElementById('generate-btn');
        const display = document.getElementById('id-display');

        generateBtn.addEventListener('click', () => {
            // 1. Get current time in milliseconds (ever-increasing)
            const timestamp = Date.now(); 
            
            // 2. Generate a random 5-digit number to ensure uniqueness 
            // even if clicked multiple times in the same millisecond
            const randomSuffix = Math.floor(Math.random() * 90000) + 10000;
            
            // 3. Combine them
            const finalID = `${timestamp}${randomSuffix}`;
            
            // Update the UI
            display.innerText = finalID;
            
            // Subtle animation effect
            display.style.backgroundColor = "#e1f5fe";
            setTimeout(() => {
                display.style.backgroundColor = "#f8f9fa";
            }, 200);
        });
    </script>

</body>
</html>
